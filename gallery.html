    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./lightbox_copy/js/lightbox.js"></script>
    <script>
        lightbox.option({
            'albumLabel': 'Image %1 of %2',
            'fadeDuration': 200,
            'imageFadeDuration': 200,
            'resizeDuration': 200,
            'wrapAround': true
        });

        const gallery = document.getElementById('gallery');
        const tagFilter = document.getElementById('tag-filter');
        const dateSort = document.getElementById('date-sort');

        function update() {
            const tag = tagFilter.value;
            const order = dateSort.value;
            const images = [...gallery.querySelectorAll('.gallery-item')];

            // Sort
            images.sort((a, b) => {
                const da = new Date(a.dataset.date);
                const db = new Date(b.dataset.date);
                return order === 'newest' ? db - da : da - db;
            });

            // Re-append in sorted order & filter
            images.forEach(img => {
                gallery.appendChild(img);
                img.style.display = (tag === 'all' || img.dataset.tags === tag) ? '' : 'none';
            });
        }

        tagFilter.addEventListener('change', update);
        dateSort.addEventListener('change', update);
        update();
    </script>
